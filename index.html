<html>
    <head>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="index.css">
        <link href="https://fonts.cdnfonts.com/css/cursed-timer-ulil" rel="stylesheet">
    </head>
    <body>
        <div class="container">
            <div>
                <h3 class="team-header">HOME</h3>
                <div class="team-score-background">
                    <p class="team-score" id="home-score">00</p>
                </div>
                <div class="button-container">
                    <button onclick="addPoints('HOME', 1)">+1</button>
                    <button onclick="addPoints('HOME', 2)">+2</button>
                    <button onclick="addPoints('HOME', 3)">+3</button>
                </div>
            </div>
            <div>
                <h3 class="team-header">AWAY</h3>
                <div class="team-score-background">
                    <p class="team-score" id="away-score">00</p>
                </div>
                <div class="button-container">
                    <button onclick="addPoints('AWAY', 1)">+1</button>
                    <button onclick="addPoints('AWAY', 2)">+2</button>
                    <button onclick="addPoints('AWAY', 3)">+3</button>
                </div>
            </div>
        </div>
        <script src="index.js" defer type="module"></script>
    </body>
</html>
